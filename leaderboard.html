<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Liderlik Tablosu — cizgisavaslari.com</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .lb-page {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .lb-header {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeInUp 0.4s ease-out;
        }

        .lb-header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-gold), var(--neon-orange), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .lb-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Top 3 Podium */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 28px;
            animation: fadeInUp 0.5s ease-out;
        }

        .podium-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 16px;
            text-align: center;
            flex: 1;
            max-width: 140px;
            transition: transform 0.3s;
        }

        .podium-item:hover {
            transform: translateY(-4px);
        }

        .podium-item.gold {
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
            order: 2;
            padding-bottom: 32px;
        }

        .podium-item.silver {
            border-color: rgba(192, 192, 192, 0.4);
            order: 1;
        }

        .podium-item.bronze {
            border-color: rgba(205, 127, 50, 0.4);
            order: 3;
        }

        .podium-rank {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .podium-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 0 auto 8px;
        }

        .podium-item.gold .podium-avatar {
            background: linear-gradient(135deg, var(--neon-gold), var(--neon-orange));
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .podium-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .podium-level {
            font-size: 11px;
            color: var(--neon-cyan);
            font-weight: 500;
        }

        .podium-xp {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Table */
        .lb-table {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }

        .lb-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .lb-row:last-child {
            border-bottom: none;
        }

        .lb-row:hover {
            background: var(--bg-hover);
        }

        .lb-row.me {
            background: rgba(191, 95, 255, 0.08);
            border-left: 3px solid var(--neon-purple);
        }

        .lb-rank {
            width: 32px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
            flex-shrink: 0;
        }

        .lb-row.me .lb-rank {
            color: var(--neon-purple);
        }

        .lb-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .lb-info {
            flex: 1;
            min-width: 0;
        }

        .lb-info .lb-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lb-info .lb-meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        .lb-level {
            font-size: 13px;
            font-weight: 600;
            color: var(--neon-cyan);
            text-align: right;
            flex-shrink: 0;
        }

        .lb-empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .nav-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-bar .btn {
            flex: 1;
            text-decoration: none;
            text-align: center;
        }

        @media (max-width: 480px) {
            .podium-item {
                padding: 14px 10px;
            }

            .podium-name {
                font-size: 11px;
            }
        }
    </style>
</head>

<body>
    <div class="lb-page">
        <div class="nav-bar">
            <a href="index.html" class="btn ghost">← Ana Sayfa</a>
            <a href="profile.html" class="btn ghost">👤 Profilim</a>
        </div>

        <div class="lb-header">
            <h1>🏆 Liderlik Tablosu</h1>
            <p>En yüksek seviyeli oyuncular</p>
        </div>

        <!-- Top 3 Podium -->
        <div class="podium" id="podium" style="display:none;"></div>

        <!-- Loading -->
        <div id="lbLoading" style="text-align:center; padding:40px;">
            <div style="font-size:40px; margin-bottom:12px;">⏳</div>
            <p style="color:var(--text-muted);">Sıralama yükleniyor...</p>
        </div>

        <!-- Table -->
        <div class="lb-table" id="lbTable" style="display:none;"></div>

        <!-- Empty State -->
        <div class="lb-empty" id="lbEmpty" style="display:none;">
            😕 Henüz sıralamada kimse yok. İlk sen ol!
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const avatars = ['🎮', '⚔️', '👑', '🏆', '💎', '🔥', '🌟', '🚀'];

        function getAvatar(level) {
            return avatars[Math.min(Math.floor((level || 1) / 5), avatars.length - 1)];
        }

        auth.onAuthStateChanged(async () => {
            loadLeaderboard();
        });

        async function loadLeaderboard() {
            try {
                const snapshot = await database.ref('leaderboard')
                    .orderByChild('totalXP')
                    .limitToLast(50)
                    .once('value');

                const players = [];
                snapshot.forEach(child => {
                    players.push({ uid: child.key, ...child.val() });
                });

                // Sort descending by totalXP
                players.sort((a, b) => (b.totalXP || 0) - (a.totalXP || 0));

                document.getElementById('lbLoading').style.display = 'none';

                if (players.length === 0) {
                    document.getElementById('lbEmpty').style.display = 'block';
                    return;
                }

                const currentUid = auth.currentUser ? auth.currentUser.uid : null;

                // Render podium (top 3)
                if (players.length >= 3) {
                    renderPodium(players.slice(0, 3));
                }

                // Render table (4+)
                const remaining = players.length >= 3 ? players.slice(3) : players;
                const startRank = players.length >= 3 ? 4 : 1;
                renderTable(remaining, startRank, currentUid);

            } catch (error) {
                document.getElementById('lbLoading').innerHTML = `
					<p style="color:var(--danger);">Yükleme hatası. Lütfen sayfayı yenileyin.</p>
				`;
            }
        }

        function renderPodium(top3) {
            const podium = document.getElementById('podium');
            const classes = ['gold', 'silver', 'bronze'];
            const medals = ['🥇', '🥈', '🥉'];

            podium.innerHTML = top3.map((p, i) => {
                const rank = classes[i];
                // Podium order: silver(1), gold(0), bronze(2)
                const orderMap = [1, 0, 2];
                return `
					<div class="podium-item ${rank}" style="order:${orderMap[i]}">
						<div class="podium-rank">${medals[i]}</div>
						<div class="podium-avatar">${getAvatar(p.level)}</div>
						<div class="podium-name">${escapeHtml(p.displayName || 'Oyuncu')}</div>
						<div class="podium-level">Lv.${p.level || 1}</div>
						<div class="podium-xp">${p.totalXP || 0} XP</div>
					</div>
				`;
            }).join('');

            podium.style.display = 'flex';
        }

        function renderTable(players, startRank, currentUid) {
            if (players.length === 0) return;

            const table = document.getElementById('lbTable');
            table.innerHTML = players.map((p, i) => {
                const rank = startRank + i;
                const isMe = p.uid === currentUid;
                return `
					<div class="lb-row ${isMe ? 'me' : ''}">
						<div class="lb-rank">#${rank}</div>
						<div class="lb-avatar">${getAvatar(p.level)}</div>
						<div class="lb-info">
							<div class="lb-name">${escapeHtml(p.displayName || 'Oyuncu')}${isMe ? ' (Sen)' : ''}</div>
							<div class="lb-meta">${p.totalXP || 0} XP</div>
						</div>
						<div class="lb-level">Lv.${p.level || 1}</div>
					</div>
				`;
            }).join('');

            table.style.display = 'block';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>

</html>
